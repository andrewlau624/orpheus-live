name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      # PortAudio system lib so `import sounddevice` works during collection.
      - name: Install PortAudio
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      # Create an isolated venv. `--system` targets the runner's system Python,
      # which is externally managed (PEP 668) and rejects installs; a uv venv
      # sidesteps that and pins the Python we just installed.
      - name: Create virtualenv
        run: uv venv --python 3.13

      # Deliberately skip the heavy runtime deps: mlx-audio/mlx-whisper are
      # Apple-Silicon only and Orpheus pulls ~2GB of weights at runtime. Unit
      # tests exercise pure logic (sanitize, presets, cognition, speculation,
      # playback, memory, barge-in) against fakes and lazy-import mlx only when
      # actually synthesizing, so only the light libs the tests touch are needed.
      # torch cpu comes in via silero-vad (the vad module imports it at import).
      - name: Install lightweight deps
        run: >
          uv pip install pydantic pydantic-settings ollama numpy
          sounddevice silero-vad pytest ruff
          --index-strategy unsafe-best-match
          --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install project (editable, no heavy deps)
        run: uv pip install -e . --no-deps

      - name: Ruff check
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
